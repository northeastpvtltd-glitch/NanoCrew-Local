<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoCrew-Local Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-dim: #8891a5;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --yellow: #fdcb6e;
    --red: #e17055;
    --cyan: #74b9ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent-light); }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .conn-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .conn-dot.connected { background: var(--green); }

  /* Layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 1000px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card h2 {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .card.full-width {
    grid-column: 1 / -1;
  }

  /* Metrics */
  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .metric-row:last-child { border-bottom: none; }
  .metric-label { font-size: 14px; color: var(--text-dim); }
  .metric-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .metric-value.good { color: var(--green); }
  .metric-value.warn { color: var(--yellow); }
  .metric-value.bad { color: var(--red); }

  /* Progress bars */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease, background 0.3s;
  }

  /* Status badges */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.online { background: rgba(0,184,148,0.15); color: var(--green); }
  .badge.offline { background: rgba(225,112,85,0.15); color: var(--red); }
  .badge.idle { background: rgba(116,185,255,0.15); color: var(--cyan); }
  .badge.busy { background: rgba(253,203,110,0.15); color: var(--yellow); }

  /* Crew cards */
  .crew-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .crew-card:last-child { margin-bottom: 0; }
  .crew-name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .crew-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .agent-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .agent-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 4px 10px;
    font-size: 12px;
  }
  .agent-chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .agent-chip.active .dot {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Activity feed */
  .feed {
    max-height: 400px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .feed-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-time {
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 60px;
  }
  .feed-icon { font-size: 14px; min-width: 20px; text-align: center; }
  .feed-text { color: var(--text); flex: 1; }
  .feed-text strong { color: var(--accent-light); }

  /* Suggestions */
  .suggest-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .suggest-btn:hover { background: var(--accent-light); color: var(--bg); }
  .suggest-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .suggestions-text {
    margin-top: 14px;
    padding: 14px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }

  /* Ollama info row */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .info-item {
    padding: 10px;
    background: var(--surface2);
    border-radius: 8px;
  }
  .info-item .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .info-item .value {
    font-size: 16px;
    font-weight: 700;
    margin-top: 4px;
  }

  /* AGPL footer */
  .footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent-light); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Nano</span>Crew Dashboard</h1>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">Connecting...</span>
  </div>
</div>

<div class="grid">
  <!-- System Metrics -->
  <div class="card">
    <h2>System Resources</h2>
    <div class="metric-row">
      <span class="metric-label">CPU</span>
      <span class="metric-value" id="cpuVal">—</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="cpuBar" style="width:0%;background:var(--green)"></div></div>

    <div class="metric-row" style="margin-top:12px">
      <span class="metric-label">RAM</span>
      <span class="metric-value" id="ramVal">—</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="ramBar" style="width:0%;background:var(--green)"></div></div>

    <div class="metric-row" style="margin-top:12px">
      <span class="metric-label">Disk</span>
      <span class="metric-value" id="diskVal">—</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="diskBar" style="width:0%;background:var(--green)"></div></div>
  </div>

  <!-- Ollama Status -->
  <div class="card">
    <h2>Ollama Status</h2>
    <div class="info-grid">
      <div class="info-item">
        <div class="label">Status</div>
        <div class="value" id="ollamaStatus">—</div>
      </div>
      <div class="info-item">
        <div class="label">Model</div>
        <div class="value" id="ollamaModel">—</div>
      </div>
      <div class="info-item">
        <div class="label">LLM Lock</div>
        <div class="value" id="llmLock">—</div>
      </div>
      <div class="info-item">
        <div class="label">Code Exec</div>
        <div class="value" id="codeExec">—</div>
      </div>
    </div>
  </div>

  <!-- AI Suggestions -->
  <div class="card">
    <h2>AI Suggestions</h2>
    <button class="suggest-btn" id="suggestBtn" onclick="getSuggestions()">
      Analyze &amp; Suggest Improvements
    </button>
    <div class="suggestions-text" id="suggestText" style="display:none"></div>
  </div>

  <!-- Companies (Crews) -->
  <div class="card full-width" style="grid-column: 1 / -1;">
    <h2>Companies (Crews)</h2>
    <div id="crewsContainer">Loading crews...</div>
  </div>

  <!-- Activity Feed -->
  <div class="card full-width">
    <h2>Live Activity</h2>
    <div class="feed" id="activityFeed">
      <div class="feed-item">
        <span class="feed-time">—</span>
        <span class="feed-icon">⏳</span>
        <span class="feed-text">Waiting for events...</span>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  NanoCrew-Local &mdash; Licensed under <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank">AGPL-3.0</a>.
  <a href="https://github.com/northeastpvtltd-glitch/NanoCrew-Local" target="_blank">Source Code</a>
</div>

<script>
(function() {
  "use strict";

  // ---------- WebSocket ----------
  let ws = null;
  let reconnectTimer = null;
  const MAX_FEED = 100;

  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(proto + "//" + location.host + "/ws");

    ws.onopen = function() {
      document.getElementById("connDot").classList.add("connected");
      document.getElementById("connText").textContent = "Connected";
      fetchStatus();
      fetchCrews();
    };

    ws.onclose = function() {
      document.getElementById("connDot").classList.remove("connected");
      document.getElementById("connText").textContent = "Reconnecting...";
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = function() {
      ws.close();
    };

    ws.onmessage = function(evt) {
      try {
        const event = JSON.parse(evt.data);
        handleEvent(event);
      } catch(e) { /* ignore parse errors */ }
    };
  }

  function handleEvent(event) {
    if (event.type === "metrics") {
      updateMetrics(event);
    } else if (event.type === "agent_start" || event.type === "agent_done") {
      addFeedItem(event);
      updateAgentStatus(event);
    }
  }

  // ---------- Metrics ----------
  function updateMetrics(m) {
    setMetric("cpuVal", "cpuBar", m.cpu_percent, "%");
    setMetric("ramVal", "ramBar", m.ram_percent, "%",
      m.ram_used_gb.toFixed(1) + " / " + m.ram_total_gb.toFixed(1) + " GB");
    setMetric("diskVal", "diskBar", m.disk_percent, "%",
      m.disk_used_gb.toFixed(1) + " / " + m.disk_total_gb.toFixed(1) + " GB");
  }

  function setMetric(valId, barId, pct, unit, label) {
    const el = document.getElementById(valId);
    const bar = document.getElementById(barId);
    el.textContent = label || (pct.toFixed(1) + unit);
    el.className = "metric-value " + (pct < 60 ? "good" : pct < 85 ? "warn" : "bad");
    bar.style.width = Math.min(pct, 100) + "%";
    bar.style.background = pct < 60 ? "var(--green)" : pct < 85 ? "var(--yellow)" : "var(--red)";
  }

  // ---------- Activity Feed ----------
  function addFeedItem(event) {
    const feed = document.getElementById("activityFeed");
    // Remove placeholder
    if (feed.querySelector(".feed-text")?.textContent === "Waiting for events...") {
      feed.innerHTML = "";
    }

    const item = document.createElement("div");
    item.className = "feed-item";

    const time = new Date(event.ts * 1000);
    const timeStr = time.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"});

    let icon, text;
    if (event.type === "agent_start") {
      icon = "▶️";
      text = "<strong>" + esc(event.agent) + "</strong> started " +
             "(" + event.step + "/" + event.total + " in " + esc(event.crew) + ")";
    } else if (event.type === "agent_done") {
      icon = "✅";
      text = "<strong>" + esc(event.agent) + "</strong> finished " +
             "(" + event.output_length + " chars)";
    } else {
      return;
    }

    item.innerHTML =
      '<span class="feed-time">' + timeStr + '</span>' +
      '<span class="feed-icon">' + icon + '</span>' +
      '<span class="feed-text">' + text + '</span>';

    feed.prepend(item);

    // Cap feed length
    while (feed.children.length > MAX_FEED) {
      feed.removeChild(feed.lastChild);
    }
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // ---------- Agent status highlighting ----------
  const activeAgents = new Set();

  function updateAgentStatus(event) {
    const chipId = "chip-" + slugify(event.crew) + "-" + slugify(event.agent);
    const chip = document.getElementById(chipId);
    if (!chip) return;

    if (event.type === "agent_start") {
      chip.classList.add("active");
      activeAgents.add(chipId);
    } else if (event.type === "agent_done") {
      chip.classList.remove("active");
      activeAgents.delete(chipId);
    }
  }

  function slugify(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g, "_");
  }

  // ---------- REST endpoints ----------
  function fetchStatus() {
    fetch("/api/status")
      .then(r => r.json())
      .then(data => {
        document.getElementById("ollamaStatus").innerHTML =
          data.ollama_online
            ? '<span class="badge online">ONLINE</span>'
            : '<span class="badge offline">OFFLINE</span>';
        document.getElementById("ollamaModel").textContent = data.model;
        document.getElementById("llmLock").innerHTML =
          data.llm_busy
            ? '<span class="badge busy">BUSY</span>'
            : '<span class="badge idle">IDLE</span>';
        document.getElementById("codeExec").innerHTML =
          data.code_execution
            ? '<span class="badge online">ON</span>'
            : '<span class="badge offline">OFF</span>';
      })
      .catch(() => {});

    // Refresh every 10s
    setTimeout(fetchStatus, 10000);
  }

  function fetchCrews() {
    fetch("/api/crews")
      .then(r => r.json())
      .then(crews => {
        const container = document.getElementById("crewsContainer");
        if (!crews.length) {
          container.textContent = "No crews loaded.";
          return;
        }
        container.innerHTML = "";
        crews.forEach(function(crew) {
          const card = document.createElement("div");
          card.className = "crew-card";

          let agentsHtml = "";
          crew.agents.forEach(function(agent) {
            const chipId = "chip-" + slugify(crew.name) + "-" + slugify(agent.name);
            const execBadge = agent.can_execute ? ' 🔧' : '';
            agentsHtml +=
              '<div class="agent-chip" id="' + chipId + '">' +
              '<div class="dot"></div>' +
              esc(agent.name) + execBadge +
              '</div>';
          });

          card.innerHTML =
            '<div class="crew-name">' + esc(crew.name) + '</div>' +
            '<div class="crew-desc">' + esc(crew.description) + '</div>' +
            '<div class="agent-list">' + agentsHtml + '</div>';

          container.appendChild(card);
        });
      })
      .catch(function() {
        document.getElementById("crewsContainer").textContent = "Failed to load crews.";
      });
  }

  // ---------- AI Suggestions ----------
  window.getSuggestions = function() {
    const btn = document.getElementById("suggestBtn");
    const textEl = document.getElementById("suggestText");
    btn.disabled = true;
    btn.textContent = "Analyzing...";
    textEl.style.display = "block";
    textEl.textContent = "Asking the LLM to analyze your setup...";

    fetch("/api/suggest", { method: "POST" })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          textEl.textContent = "Error: " + data.error;
        } else {
          textEl.textContent = data.suggestions;
        }
        btn.disabled = false;
        btn.textContent = "Analyze & Suggest Improvements";
      })
      .catch(function(err) {
        textEl.textContent = "Failed to get suggestions: " + err.message;
        btn.disabled = false;
        btn.textContent = "Analyze & Suggest Improvements";
      });
  };

  // ---------- Init ----------
  connect();
})();
</script>
</body>
</html>
