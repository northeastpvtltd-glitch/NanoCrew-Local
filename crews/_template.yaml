# ============================================================
# NanoCrew-Local — Crew Template
# ============================================================
# Copy this file, rename it (e.g., my_crew.yaml), and place it
# in the crews/ directory.  The bot auto-discovers all *.yaml
# files in this folder on startup.
#
# Files starting with _ (like this one) are ignored by the
# loader, so this template is never treated as a live crew.
#
# PIPELINE ORDER:
#   Agents execute top-to-bottom.  The first agent receives the
#   user's raw instruction.  Every subsequent agent receives the
#   previous agent's full output as its input.
#
# HARDWARE GUIDELINE:
#   On 16 GB RAM with a 4B model, 3 agents is the comfortable
#   maximum.  Each additional agent adds context overhead.
#   Scale up hardware before scaling up agent count.
# ============================================================

name: "My Custom Crew"
description: "Describe what this crew does in one sentence."

# Optional: the engine warns users when available RAM is below this.
recommended_max_ram_gb: 16

agents:
  - name: "First Agent"
    role: "What this agent does in one line"
    system_prompt: |
      You are [role description].
      Your task is to [specific instructions].

      RULES:
      - [Rule 1]
      - [Rule 2]

      OUTPUT FORMAT:
      [Describe the structure your output should follow]
    temperature: 0.5
    # can_execute: false         # Set to true to allow this agent to run
    #                            # system commands from fenced code blocks.
    #                            # Requires ENABLE_CODE_EXECUTION=true in .env.
    #                            # Only whitelisted read-only commands are
    #                            # permitted — see core_orchestrator.py.
    # model: "gemma4:12b"       # Optional: override the global model
    # options:                   # Optional: raw Ollama generation options
    #   top_p: 0.9
    #   num_predict: 2048

  - name: "Second Agent"
    role: "What this agent does in one line"
    system_prompt: |
      You are [role description].
      You receive input from the previous agent.
      Your task is to [specific instructions].
    temperature: 0.5

  # Add more agents below.  Each one chains from the previous.
  # Remember: more agents = longer pipeline time on constrained hardware.
